# ─────────────────────────────────────────────────────────────────────
# Documentation and audit records — docs/
# ─────────────────────────────────────────────────────────────────────

docs:
  PRD.md:
    purpose: Product Requirements Document — starting point for Phase 0. Describes product goals, user stories, acceptance criteria.
    executed: Read during Phase 0 and phase planning.

  TDD.template.md:
    purpose: Technical Design Document template — placeholder sections for overview, tech stack, architecture, data model, API.
    executed: Used as starting point during TDD generation in Phase 0.

  index.html:
    purpose: Interactive web dashboard for keel — phase status, gate records, audit timeline.
    executed: Opened in browser by developer.

  phases/phase_0.md:
    purpose: Phase 0 build prompt — objective, inputs, outputs, steps, exit criteria for harness bootstrap.
    executed: Read by agent during Phase 0 execution.

  phases/phase_0.prompt.md:
    purpose: Phase 0 harness-only prompt — tells agent to generate harness only, no product code.
    executed: Read by agent during Phase 0.

  audit/phase_0.log:
    purpose: Phase 0 human-readable audit log — timestamp, agent, actions, verification, gate result.
    executed: Written by `keel phase close 0`. Read by developers for audit review.

  build-ledger/phase_0_build.md:
    purpose: Phase 0 build ledger — model, summary, files, commands, status.
    executed: Written by `keel phase close 0`. Read by developers for build review.

  decisions/:
    purpose: Architecture Decision Records (ADRs) — written when significant architectural decisions are made.
    executed: Written during phase execution when needed. Read for historical context.
